<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2DF96" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA8010" />
    </linearGradient>
  </defs>
  
  <!-- Base Background -->
  <rect width="512" height="512" rx="112" fill="#FBFBF9" />
  
  <!-- Inner Border ring -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="none" stroke="url(#gold)" stroke-width="12" opacity="0.8" />
  <rect x="40" y="40" width="432" height="432" rx="80" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.4" />
  
  <!-- Corner Ornaments (Javanese subtle) -->
  <path d="M60 60 L120 60 L120 72 L72 72 L72 120 L60 120 Z" fill="url(#gold)" opacity="0.7" />
  <path d="M452 60 L392 60 L392 72 L440 72 L440 120 L452 120 Z" fill="url(#gold)" opacity="0.7" />
  <path d="M60 452 L120 452 L120 440 L72 440 L72 392 L60 392 Z" fill="url(#gold)" opacity="0.7" />
  <path d="M452 452 L392 452 L392 440 L440 440 L440 392 L452 392 Z" fill="url(#gold)" opacity="0.7" />

  <!-- Monogram RF -->
  <text x="256" y="335" font-family="Georgia, serif" font-size="220" font-weight="normal" font-style="italic" text-anchor="middle" fill="url(#gold)">R&amp;F</text>
  
  <!-- Hanacaraka decorative subtle mark -->
  <text x="256" y="420" font-family="sans-serif" font-size="40" font-weight="normal" text-anchor="middle" fill="url(#gold)" opacity="0.3">ꦏꦂꦱ</text>
